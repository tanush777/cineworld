<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#e5bd09">
  <meta name="description" content="Browse, rate, and organize your favorite movies and TV shows with advanced features">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CineWorld">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23e5bd09' width='100' height='100'/><text x='50' y='75' font-size='70' text-anchor='middle' fill='%23000'>🎬</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23e5bd09' width='180' height='180'/><text x='90' y='135' font-size='120' text-anchor='middle' fill='%23000'>🎬</text></svg>">
  <title>CineWorld - Movie Bucket List</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #000000;
      --bg-secondary: #0a0a0a;
      --bg-tertiary: #050505;
      --bg-card: #0f0f0f;
      --bg-controls: #1a1a1a;
      --text-primary: #ffffff;
      --text-secondary: #d0d0d0;
      --accent-gold: #e5bd09;
      --accent-yellow: #ffcc00;
      --accent-blue: #00bfff;
      --border-gold: rgba(229, 189, 9, 0.15);
    }

    body.light-theme {
      --bg-primary: #f8f8f8;
      --bg-secondary: #f0f0f0;
      --bg-tertiary: #e6e6e6;
      --bg-card: #ffffff;
      --bg-controls: #fafafa;
      --text-primary: #1a1a1a;
      --text-secondary: #666;
      --accent-gold: #d4a820;
      --accent-yellow: #cc9900;
      --accent-blue: #0066cc;
      --border-gold: rgba(212, 168, 32, 0.25);
    }

    body {
      font-family: 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* HEADER - Modern Glassmorphism */
    header {
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1.5px solid var(--border-gold);
      padding: 20px 40px;
      font-size: 2.5em;
      font-weight: 700;
      box-shadow: 0 8px 30px rgba(229, 189, 9, 0.08);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      color: var(--accent-gold);
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(229, 189, 9, 0.25);
      transition: all 0.3s ease;
    }

    header::before {
      content: '🎬';
      font-size: 2.5em;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    header a {
      color: var(--accent-blue);
      text-decoration: none;
      font-size: 0.9em;
      transition: all 0.3s ease;
      padding: 5px 10px;
      border-radius: 20px;
      background: rgba(0, 191, 255, 0.08);
      border: 1px solid rgba(0, 191, 255, 0.25);
      font-weight: 600;
    }

    header a:hover {
      background: rgba(0, 191, 255, 0.2);
      box-shadow: 0 0 15px rgba(0, 191, 255, 0.4);
      transform: translateY(-2px);
    }

    body.light-theme header {
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      border-bottom: 1.5px solid rgba(212, 168, 32, 0.2);
    }

    body.light-theme header {
      color: #d4a820;
      text-shadow: 0 0 15px rgba(212, 168, 32, 0.1);
    }

    body.light-theme header a {
      color: #0066cc;
      background: rgba(0, 102, 204, 0.08);
      border: 1px solid rgba(0, 102, 204, 0.25);
    }

    body.light-theme header a:hover {
      background: rgba(0, 102, 204, 0.15);
      box-shadow: 0 0 12px rgba(0, 102, 204, 0.3);
    }

    body.light-theme #theme-toggle,
    body.light-theme #favorites-btn {
      background: rgba(0, 102, 204, 0.08);
      border: 1px solid rgba(0, 102, 204, 0.25);
      color: #0066cc;
    }

    body.light-theme #theme-toggle:hover,
    body.light-theme #favorites-btn:hover {
      background: rgba(0, 102, 204, 0.15);
      box-shadow: 0 0 12px rgba(0, 102, 204, 0.3);
    }

    #theme-toggle, #favorites-btn {
      background: rgba(0, 191, 255, 0.08);
      border: 1px solid rgba(0, 191, 255, 0.25);
      color: var(--accent-blue);
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85em;
      transition: all 0.3s ease;
      font-weight: 600;
    }

    #theme-toggle:hover, #favorites-btn:hover {
      background: rgba(0, 191, 255, 0.15);
      box-shadow: 0 0 15px rgba(0, 191, 255, 0.3);
      transform: translateY(-2px);
    }

    #favorites-badge {
      display: inline-block;
      background: var(--accent-gold);
      color: #1c1c1c;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      line-height: 18px;
      text-align: center;
      font-size: 0.7em;
      font-weight: bold;
      margin-left: 4px;
    }

    /* CONTROLS SECTION */
    #controls-section {
      padding: 20px 40px;
      background: rgba(10, 10, 10, 0.8);
      backdrop-filter: blur(10px);
      margin: 20px 40px;
      border-radius: 15px;
      border: 1px solid rgba(229, 189, 9, 0.12);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
      animation: slideDown 0.6s ease-out;
      transition: all 0.3s ease;
    }

    body.light-theme #controls-section {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, rgba(250, 250, 250, 0.8) 100%);
      border-color: rgba(212, 168, 32, 0.3);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #search-bar {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      position: relative;
    }

    #search-input {
      flex-grow: 1;
      padding: 12px 20px;
      border: 2px solid rgba(229, 189, 9, 0.2);
      border-radius: 30px;
      font-size: 1em;
      background: rgba(15, 15, 15, 0.9);
      color: #ffffff;
      min-width: 200px;
      transition: all 0.3s ease;
      position: relative;
      z-index: 999;
    }

    body.light-theme #search-input {
      background: rgba(255, 255, 255, 0.95);
      color: #1a1a1a;
      border-color: rgba(212, 168, 32, 0.35);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    body.light-theme #search-input:focus {
      background: rgba(255, 255, 255, 0.98);
      border-color: #d4a820;
      box-shadow: 0 0 15px rgba(212, 168, 32, 0.2);
    }

    #search-input:focus {
      outline: none;
      border-color: #e5bd09;
      background: rgba(10, 10, 10, 0.98);
      box-shadow: 0 0 20px rgba(229, 189, 9, 0.25);
    }

    #search-input::placeholder {
      color: #999;
    }

    #search-button {
      padding: 12px 30px;
      background: linear-gradient(135deg, #e5bd09 0%, #ffcc00 100%);
      color: #000000;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1em;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(229, 189, 9, 0.25);
    }

    #search-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(229, 189, 9, 0.4);
    }

    #search-button:active {
      transform: translateY(0);
    }

    body.light-theme #search-button {
      background: linear-gradient(135deg, #d4a820 0%, #cc9900 100%);
      box-shadow: 0 4px 15px rgba(212, 168, 32, 0.2);
    }

    body.light-theme #search-button:hover {
      box-shadow: 0 6px 20px rgba(212, 168, 32, 0.3);
    }

    body.light-theme #search-input::placeholder {
      color: #aaa;
    }

    /* SUGGESTIONS DROPDOWN - YouTube Style */
    #suggestions-container {
      scrollbar-width: thin;
      scrollbar-color: rgba(229, 189, 9, 0.2) transparent;
    }

    #suggestions-container::-webkit-scrollbar {
      width: 6px;
    }

    #suggestions-container::-webkit-scrollbar-track {
      background: transparent;
    }

    #suggestions-container::-webkit-scrollbar-thumb {
      background: rgba(229, 189, 9, 0.2);
      border-radius: 3px;
    }

    #suggestions-container::-webkit-scrollbar-thumb:hover {
      background: rgba(229, 189, 9, 0.35);
    }

    /* SORT CONTROLS */
    #sort-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #sort-controls label {
      color: #e5bd09;
      font-weight: 600;
      font-size: 0.95em;
    }

    #sort-controls select {
      padding: 10px 15px;
      border-radius: 25px;
      background: rgba(15, 15, 15, 0.9);
      color: #ffffff;
      border: 2px solid rgba(229, 189, 9, 0.2);\n      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    body.light-theme #sort-controls select {
      background: rgba(255, 255, 255, 0.95);
      color: #1a1a1a;
      border-color: rgba(212, 168, 32, 0.35);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    #sort-controls select:hover,
    #sort-controls select:focus {
      border-color: #e5bd09;
      background: rgba(10, 10, 10, 0.98);
      box-shadow: 0 0 15px rgba(229, 189, 9, 0.2);
    }

    /* GENRE FILTERS */
    #genre-filters {
      text-align: center;
      padding-top: 15px;
      border-top: 2px solid rgba(229, 189, 9, 0.2);
      margin-top: 15px;
    }

    /* DISCOVERY TABS */
    #discovery-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 2px solid rgba(229, 189, 9, 0.2);
    }

    .discovery-tab {
      background: rgba(20, 20, 20, 0.7);
      color: #d0d0d0;
      border: 2px solid rgba(255, 204, 0, 0.2);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      font-size: 0.9em;
    }

    .discovery-tab:hover {
      background: rgba(255, 204, 0, 0.15);
      border-color: var(--accent-yellow);
      color: var(--accent-yellow);
      transform: translateY(-2px);
      box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
    }

    .discovery-tab.active {
      background: linear-gradient(135deg, var(--accent-yellow) 0%, var(--accent-gold) 100%);
      color: #000000;
      border-color: var(--accent-yellow);
      box-shadow: 0 4px 15px rgba(255, 204, 0, 0.25);
    }

    body.light-theme .discovery-tab {
      background: rgba(230, 230, 230, 0.6);
      color: #555;
      border-color: rgba(212, 168, 32, 0.3);
    }

    body.light-theme .discovery-tab:hover {
      background: rgba(212, 168, 32, 0.1);
      border-color: #d4a820;
      color: #8b7500;
      box-shadow: 0 2px 12px rgba(212, 168, 32, 0.2);
    }

    body.light-theme .discovery-tab.active {
      color: #6b5900;
      box-shadow: 0 4px 15px rgba(212, 168, 32, 0.3);
    }

    /* SEARCH HISTORY */
    #search-history {
      list-style: none;
      margin-top: 5px;
    }

    #search-history li {
      padding: 8px 20px;
      cursor: pointer;
      color: #bbb;
      transition: all 0.2s ease;
      border-bottom: 1px solid rgba(229, 189, 9, 0.1);
    }

    #search-history li:hover {
      background: rgba(0, 191, 255, 0.1);
      color: var(--accent-blue);
    }

    #search-history li:last-child {
      border-bottom: none;
    }

    body.light-theme #search-history li {
      color: #666;
      border-bottom: 1px solid rgba(212, 168, 32, 0.1);
    }

    body.light-theme #search-history li:hover {
      background: rgba(0, 102, 204, 0.08);
      color: #0066cc;
    }

    /* RUNTIME DISPLAY */
    .movie-runtime {
      font-size: 0.85em;
      color: var(--accent-gold);
      margin: 5px 0;
      font-weight: 600;
    }

    /* SIMILAR MOVIES SECTION */
    #similar-movies {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 2px solid rgba(0, 191, 255, 0.2);
    }

    #similar-movies h3 {
      color: var(--accent-blue);
      margin-bottom: 15px;
      font-size: 1.2em;
      font-weight: 700;
    }

    body.light-theme #similar-movies h3 {
      color: #0066cc;
    }

    .similar-movie-row {
      display: flex;
      gap: 15px;
      overflow-x: auto;
      padding-bottom: 10px;
      scroll-behavior: smooth;
    }

    .similar-movie-row::-webkit-scrollbar {
      height: 4px;
    }

    .similar-movie-row::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
    }

    .similar-movie-row::-webkit-scrollbar-thumb {
      background: rgba(0, 191, 255, 0.25);
      border-radius: 10px;
    }

    .similar-movie-row::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 191, 255, 0.4);
    }

    .similar-movie {
      flex-shrink: 0;
      cursor: pointer;
      text-align: center;
    }

    .similar-movie img {
      width: 100px;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid rgba(0, 191, 255, 0.3);
      transition: all 0.3s ease;
    }

    body.light-theme .similar-movie img {
      border-color: rgba(0, 102, 204, 0.3);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    body.light-theme .similar-movie img:hover {
      border-color: #0066cc;
      box-shadow: 0 4px 15px rgba(0, 102, 204, 0.25);
    }

    .similar-movie img:hover {
      border-color: var(--accent-blue);
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(0, 191, 255, 0.3);
    }

    .similar-movie p {
      font-size: 0.75em;
      color: #999;
      margin-top: 8px;
      max-width: 100px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    body.light-theme .similar-movie p {
      color: #777;
    }

    #genre-filters button {
      background: rgba(20, 20, 20, 0.7);
      color: #d0d0d0;
      border: 2px solid rgba(255, 204, 0, 0.2);
      padding: 10px 20px;
      margin: 8px;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      font-size: 0.95em;
    }

    body.light-theme #genre-filters button {
      background: rgba(230, 230, 230, 0.6);
      color: #4a4a4a;
      border-color: rgba(212, 168, 32, 0.35);
    }

    body.light-theme #genre-filters button:hover {
      background: rgba(212, 168, 32, 0.15);
      border-color: #d4a820;
      color: #8b7500;
      box-shadow: 0 2px 12px rgba(212, 168, 32, 0.15);
    }

    body.light-theme #genre-filters button.active {
      box-shadow: 0 4px 18px rgba(212, 168, 32, 0.3);
      color: #6b5900;
    }

    #genre-filters button:hover {
      background: rgba(255, 204, 0, 0.15);
      border-color: #ffcc00;
      color: #ffcc00;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2);
    }

    #genre-filters button.active {
      background: linear-gradient(135deg, #ffcc00 0%, #e5bd09 100%);
      color: #000000;
      border-color: #ffcc00;
      box-shadow: 0 6px 20px rgba(255, 204, 0, 0.25);
    }

    /* MAIN GRID */
    main {
      padding: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 30px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 1200px) {
      main {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 25px;
        padding: 30px;
      }
    }

    @media (max-width: 768px) {
      main {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 20px;
        padding: 20px;
      }
    }

    /* MOVIE CARDS - Modern Design */
    .movie {
      background: rgba(12, 12, 12, 0.85);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-radius: 15px;
      border: 1px solid rgba(229, 189, 9, 0.15);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
    }

    body.light-theme .movie {
      background: rgba(255, 255, 255, 0.95);
      border-color: rgba(212, 168, 32, 0.2);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }

    body.light-theme .movie:hover {
      box-shadow: 0 8px 30px rgba(212, 168, 32, 0.15), 0 0 15px rgba(212, 168, 32, 0.1);
      background: rgba(255, 255, 255, 0.98);
    }

    .movie-favorite-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.8);
      border: none;
      color: #fff;
      font-size: 1.5em;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      transition: all 0.3s ease;
      z-index: 10;
      backdrop-filter: blur(5px);
    }

    .movie-favorite-btn:hover {
      background: rgba(229, 189, 9, 0.8);
      transform: scale(1.1);
    }

    .movie-favorite-btn.favorited {
      color: var(--accent-gold);
      background: rgba(229, 189, 9, 0.2);
    }

    .movie::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.5s;
    }

    .movie:hover::before {
      left: 100%;
    }

    .movie:hover {
      transform: translateY(-8px) scale(1.05);
      border-color: #ffcc00;
      box-shadow: 0 15px 40px rgba(255, 204, 0, 0.25), 0 0 20px rgba(229, 189, 9, 0.15);
      background: rgba(15, 15, 15, 0.95);
    }

    .movie img {
      width: 100%;
      height: 280px;
      object-fit: contain;
      border-radius: 12px;
      margin-bottom: 12px;
      transition: all 0.3s ease;
    }

    .movie:hover img {
      filter: brightness(1.1) contrast(1.1);
    }

    .movie h2 {
      margin: 10px 0 8px;
      font-size: 1.1em;
      color: #ffcc00;
      text-align: center;
      font-weight: 700;
      line-height: 1.3;
    }

    .movie p {
      margin: 5px 0;
      font-size: 0.85em;
      color: #bbb;
      text-align: center;
      line-height: 1.4;
    }

    .streaming-link a {
      color: #00bfff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9em;
      transition: all 0.3s ease;
    }

    .streaming-link a:hover {
      color: #00ffff;
      text-decoration: underline;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }

    /* SPINNER */
    .spinner {
      border: 4px solid rgba(229, 189, 9, 0.2);
      border-top: 4px solid #e5bd09;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 40px auto;
      display: none;
      grid-column: 1 / -1;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* LOAD MORE BUTTON */
    #load-more-section {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 40px;
    }

    #load-more-button {
      padding: 14px 40px;
      background: linear-gradient(135deg, #00bfff 0%, #0099cc 100%);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 1.05em;
      font-weight: 700;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 191, 255, 0.25);
    }

    #load-more-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 191, 255, 0.4);
    }

    #load-more-button:active {
      transform: translateY(0);
    }

    body.light-theme #load-more-button {
      background: linear-gradient(135deg, #0066cc 0%, #004799 100%);
      box-shadow: 0 4px 15px rgba(0, 102, 204, 0.2);
    }

    body.light-theme #load-more-button:hover {
      box-shadow: 0 8px 25px rgba(0, 102, 204, 0.3);
    }

    /* MODAL STYLES */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(5px);
      animation: fadeIn 0.3s ease-out;
    }

    .modal-content {
      background: linear-gradient(135deg, rgba(8, 8, 8, 0.98) 0%, rgba(5, 5, 5, 0.98) 100%);
      border: 1px solid rgba(229, 189, 9, 0.15);
      margin: 3% auto;
      padding: 40px;
      border-radius: 20px;
      width: 90%;
      max-width: 1000px;
      max-height: 90vh;
      box-shadow: 0 10px 40px rgba(229, 189, 9, 0.15), 0 0 60px rgba(0, 0, 0, 0.9);
      display: flex;
      gap: 40px;
      position: relative;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    body.light-theme .modal-content {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.99) 0%, rgba(250, 250, 250, 0.99) 100%);
      border-color: rgba(212, 168, 32, 0.25);
      color: #1a1a1a;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12), 0 0 60px rgba(0, 0, 0, 0.08);
    }

    @media (max-width: 700px) {
      .modal-content {
        flex-direction: column;
        padding: 20px;
        gap: 20px;
        max-width: 95%;
        margin: 10% auto;
      }

      #modalPoster {
        width: 100% !important;
        height: 300px !important;
        align-self: center;
      }

      .modal-details {
        max-height: 60vh;
        padding-right: 5px;
      }

      .similar-movie img {
        width: 80px !important;
        height: 120px !important;
      }
    }

    .close {
      color: #aaa;
      float: right;
      font-size: 32px;
      font-weight: 300;
      position: absolute;
      top: 15px;
      right: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .close:hover {
      color: var(--accent-yellow);
      transform: scale(1.2) rotate(90deg);
    }

    body.light-theme .close {
      color: #888;
    }

    body.light-theme .close:hover {
      color: #d4a820;
      text-shadow: 0 0 8px rgba(212, 168, 32, 0.2);
    }

    #modalPoster {
      width: 300px;
      height: 450px;
      object-fit: cover;
      border-radius: 15px;
      flex-shrink: 0;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
    }

    .modal-details {
      flex-grow: 1;
      padding-top: 10px;
      max-height: 80vh;
      overflow-y: auto;
      padding-right: 10px;
    }

    .modal-details::-webkit-scrollbar {
      width: 6px;
    }

    .modal-details::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
    }

    .modal-details::-webkit-scrollbar-thumb {
      background: rgba(0, 191, 255, 0.25);
      border-radius: 10px;
    }

    .modal-details::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 191, 255, 0.4);
    }

    .modal-details h2 {
      color: var(--accent-yellow);
      margin-top: 0;
      font-size: 2em;
      font-weight: 700;
    }

    .modal-details p {
      margin: 12px 0;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .modal-details p strong {
      color: var(--accent-gold);
      font-weight: 700;
    }

    body.light-theme .modal-details p {
      color: #4a4a4a;
    }

    #trailer-container {
      margin-top: 25px;
      margin-bottom: 15px;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0, 191, 255, 0.2);
    }

    body.light-theme #trailer-container {
      box-shadow: 0 4px 20px rgba(0, 102, 204, 0.12);
    }

    #trailer-container iframe {
      width: 100%;
      height: 280px;
      border: none;
      border-radius: 15px;
    }

    #trailer-container p {
      padding: 20px;
      background: rgba(0, 191, 255, 0.08);
      border-radius: 15px;
    }

    /* BUTTON STYLES FOR MOBILE */
    .modal-action-buttons {
      display: flex;
      gap: 10px;
      margin: 15px 0;
      flex-wrap: wrap;
    }

    .modal-action-buttons button {
      flex: 1;
      min-width: 120px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 0.95em;
    }

    #modalTmdbLink {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: linear-gradient(135deg, var(--accent-blue) 0%, #0099cc 100%);
      color: white;
      text-decoration: none;
      border-radius: 25px;
      transition: all 0.3s ease;
      font-weight: 700;
    }

    #modalTmdbLink:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 191, 255, 0.4);
    }

    body.light-theme #modalTmdbLink {
      background: linear-gradient(135deg, #0066cc 0%, #004799 100%);
      box-shadow: 0 4px 15px rgba(0, 102, 204, 0.2);
    }

    body.light-theme #modalTmdbLink:hover {
      box-shadow: 0 6px 20px rgba(0, 102, 204, 0.3);
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      header {
        font-size: 1.8em;
        padding: 15px 20px;
      }

      header a {
        position: static;
        margin: 5px;
        font-size: 0.9em;
      }

      #controls-section {
        margin: 15px 20px;
        padding: 15px 20px;
      }

      #search-bar {
        flex-direction: column;
      }

      #search-input {
        width: 100%;
      }

      #sort-controls {
        width: 100%;
        justify-content: center;
      }

      .modal-content {
        flex-direction: column;
        padding: 15px;
        gap: 15px;
        max-width: 95% !important;
        margin: 5% auto !important;
      }

      #modalPoster {
        width: 100% !important;
        height: auto !important;
        max-height: 300px !important;
      }

      .modal-details {
        max-height: 70vh !important;
        padding-right: 8px;
      }

      .similar-movie-row {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      .similar-movie img {
        width: 80px !important;
        height: 120px !important;
      }
    }

    @media (max-width: 600px) {
      header {
        font-size: 1.5em;
        padding: 12px 15px;
      }

      header::before {
        font-size: 1.5em;
      }

      header a {
        font-size: 0.8em;
        padding: 3px 8px;
        margin: 2px;
      }

      #favorites-btn {
        font-size: 0.8em !important;
        padding: 3px 8px !important;
      }

      #controls-section {
        margin: 10px 15px;
        padding: 12px 15px;
      }

      #discovery-tabs {
        flex-wrap: wrap;
        gap: 8px;
      }

      .discovery-tab {
        font-size: 0.85em;
        padding: 8px 12px;
      }

      #search-input {
        font-size: 16px; /* Prevents zoom on iOS */
      }

      .movie-grid {
        grid-template-columns: repeat(2, 1fr) !important;
        padding: 10px;
        gap: 10px;
      }

      .movie-card {
        padding: 8px;
      }

      .movie-title {
        font-size: 0.8em;
      }

      .modal-content {
        padding: 12px;
        margin: 2% auto !important;
      }

      .close {
        font-size: 24px;
        top: 10px;
        right: 15px;
      }

      #watch-providers {
        padding: 15px !important;
        margin: 15px 0 !important;
      }

      #watch-providers a {
        padding: 8px 12px !important;
        font-size: 0.85em !important;
      }

      #watch-providers h4 {
        font-size: 0.95em !important;
      }

      #watch-providers p {
        font-size: 0.9em !important;
      }

      #production-details {
        padding: 15px !important;
        margin: 15px 0 !important;
      }

      #ratings-chart {
        margin: 15px 0 !important;
      }

      .modal-details h2 {
        font-size: 1.3em;
      }

      .modal-details h3 {
        font-size: 1.1em;
      }

      .modal-details p {
        font-size: 0.9em;
      }

      .modal-action-buttons {
        flex-direction: column;
      }

      .modal-action-buttons button {
        width: 100%;
        min-width: auto;
      }
    }

    @media (max-width: 480px) {
      header {
        font-size: 1.3em;
        padding: 10px 12px;
      }

      #favorites-btn {
        font-size: 0.75em !important;
        padding: 2px 6px !important;
      }

      .movie-grid {
        grid-template-columns: repeat(2, 1fr) !important;
        padding: 8px;
        gap: 8px;
      }

      .movie-card img {
        height: 150px;
      }

      .movie-card {
        padding: 5px;
      }

      #controls-section {
        margin: 8px 12px;
        padding: 10px 12px;
      }

      #watch-providers {
        padding: 12px !important;
      }

      #watch-providers a {
        padding: 7px 10px !important;
        font-size: 0.8em !important;
        margin-bottom: 5px;
      }

      .modal-action-buttons {
        gap: 8px;
      }

      .modal-action-buttons button {
        padding: 8px 12px !important;
        font-size: 0.85em !important;
      }
    }

    /* COLLECTIONS STYLES */
    .collection-card {
      transition: all 0.3s ease;
    }

    .collection-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 8px 20px rgba(0, 191, 255, 0.3);
    }

    @media (max-width: 1024px) {
      .collections-modal section {
        padding: 20px;
      }
    }

    @media (max-width: 768px) {
      .collections-modal {
        padding: 20px 10px !important;
      }

      .back-to-home-btn,
      .back-to-collections-btn {
        padding: 8px 16px !important;
        font-size: 0.9em !important;
      }

      .collection-card {
        min-height: 250px;
      }
    }

    @media (max-width: 600px) {
      .collections-modal section {
        padding: 15px;
      }

      .collection-card {
        min-height: 220px;
        padding: 15px;
      }

      .collection-card h2 {
        font-size: 1.1em;
      }

      .back-to-home-btn,
      .back-to-collections-btn {
        padding: 7px 12px !important;
        font-size: 0.85em !important;
      }
    }
  </style>
</head>
<body>

<header>
  <div style="position: absolute; top: 20px; left: 40px; display: flex; gap: 10px; align-items: center;">
    <button id="theme-toggle" title="Toggle Dark/Light Theme" style="font-size: 0.8em; padding: 5px 10px;">🌙 Theme</button>
  </div>
  CineWorld
  <div style="position: absolute; top: 20px; right: 40px; display: flex; gap: 10px; align-items: center;">
    <button id="favorites-btn" title="View Watchlist" style="font-size: 0.85em; padding: 6px 12px;">❤️ Watchlist<span id="favorites-badge"></span></button>
    <a href="about.html" style="font-size: 0.9em; padding: 5px 10px;">About</a> 
    <a href="contact.html" style="font-size: 0.9em; padding: 5px 10px;">Contact</a>
  </div>
</header>

<div id="controls-section">
  <div id="discovery-tabs" style="display: flex; gap: 10px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px solid rgba(229, 189, 9, 0.2);">
    <button class="discovery-tab active" data-tab="discover">All Movies</button>
    <button class="discovery-tab" data-tab="trending">Trending</button>
    <button class="discovery-tab" data-tab="popular">Popular</button>
    <button class="discovery-tab" data-tab="top-rated">Top Rated</button>
  </div>

  <div id="search-bar">
    <div style="flex-grow: 1; position: relative;">
      <input type="text" id="search-input" placeholder="🔍 Search for movies... (Press / to focus)">
      <ul id="search-history" style="display: none; position: absolute; top: 100%; left: 0; right: 0; background: rgba(30, 30, 30, 0.95); border: 1px solid rgba(229, 189, 9, 0.3); border-top: none; border-radius: 0 0 20px 20px; list-style: none; margin: 0; padding: 10px 0; z-index: 100;"></ul>
    </div>
    <button id="search-button">Search</button>
    
    <div id="sort-controls">
      <label for="sort-by">Sort by:</label>
      <select id="sort-by">
        <option value="popularity.desc">Popularity</option>
        <option value="vote_average.desc">Rating</option>
        <option value="release_date.desc">Newest First</option>
        <option value="release_date.asc">Oldest First</option>
      </select>
    </div>
  </div>
  
  <div id="advanced-filters" style="display: none; padding: 15px; background: rgba(10, 10, 10, 0.6); border-radius: 10px; margin: 15px 0; gap: 15px; display: flex; flex-wrap: wrap; align-items: center;">
    <div style="display: flex; align-items: center; gap: 8px;">
      <label for="year-filter" style="color: var(--accent-gold); font-weight: 600; font-size: 0.9em;">Year:</label>
      <input type="number" id="year-filter" min="1900" max="2099" placeholder="All years" style="padding: 6px 10px; border-radius: 15px; border: 1px solid rgba(229, 189, 9, 0.2); background: rgba(12, 12, 12, 0.9); color: white; width: 120px;">
    </div>
    <div style="display: flex; align-items: center; gap: 8px;">
      <label for="rating-filter" style="color: var(--accent-gold); font-weight: 600; font-size: 0.9em;">Rating (Min):</label>
      <input type="number" id="rating-filter" min="0" max="10" step="0.1" placeholder="0" style="padding: 6px 10px; border-radius: 15px; border: 1px solid rgba(229, 189, 9, 0.2); background: rgba(12, 12, 12, 0.9); color: white; width: 100px;">
    </div>
    <button id="toggle-filters-btn" style="padding: 6px 12px; font-size: 0.85em; background: rgba(0, 191, 255, 0.08); border: 1px solid rgba(0, 191, 255, 0.25); color: var(--accent-blue); border-radius: 15px; cursor: pointer; margin-left: auto;">Hide Filters</button>
  </div>

  <button id="show-filters-btn" style="margin: 10px 0; padding: 8px 16px; font-size: 0.85em; background: rgba(0, 191, 255, 0.08); border: 1px solid rgba(0, 191, 255, 0.25); color: var(--accent-blue); border-radius: 20px; cursor: pointer; font-weight: 600;">Advanced Filters</button>
  
  <div id="genre-filters">
    <button data-genre="all" class="active">All Genres</button>
    <button data-genre="Action">🔫 Action</button>
    <button data-genre="Drama">🎭 Drama</button>
    <button data-genre="War">⚔️ War</button>
    <button data-genre="Crime">🔍 Crime</button>
    <button data-genre="Thriller">😨 Thriller</button>
    <button data-genre="Fantasy">✨ Fantasy</button>
    <button data-genre="Comedy">😂 Comedy</button>
  </div>
</div>

<div id="content-toggle" style="display: flex; gap: 10px; margin: 20px 40px; padding-bottom: 15px; border-bottom: 2px solid rgba(229, 189, 9, 0.2);">
  <button id="movies-tab" class="content-toggle-btn active" style="padding: 10px 20px; background: rgba(0, 191, 255, 0.2); border: 1px solid rgba(0, 191, 255, 0.5); color: var(--accent-blue); border-radius: 20px; cursor: pointer; font-weight: 600; transition: all 0.3s ease;">🎬 Movies</button>
  <button id="tv-series-tab" class="content-toggle-btn" style="padding: 10px 20px; background: rgba(102, 205, 170, 0.1); border: 1px solid rgba(102, 205, 170, 0.3); color: #66cdaa; border-radius: 20px; cursor: pointer; font-weight: 600; transition: all 0.3s ease;">📺 TV Series</button>
</div>

<div id="tv-series-controls" style="display: none; padding: 20px 40px; margin: 0 40px; background: linear-gradient(135deg, rgba(42, 42, 42, 0.4) 0%, rgba(28, 28, 28, 0.4) 100%); border-radius: 15px; border: 1px solid rgba(102, 205, 170, 0.2);">
  <div id="tv-search-bar" style="display: flex; gap: 10px; margin-bottom: 15px;">
    <div style="flex-grow: 1; position: relative;">
      <input type="text" id="tv-search-input" placeholder="🔍 Search for TV Series..." style="width: 100%; padding: 10px 15px; border-radius: 20px; border: 1px solid rgba(102, 205, 170, 0.3); background: rgba(30, 30, 30, 0.8); color: white; font-size: 1em;">
    </div>
    <button id="tv-search-button" style="padding: 10px 20px; background: linear-gradient(135deg, #66cdaa 0%, #52b8a1 100%); color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; transition: all 0.3s ease;">Search</button>
  </div>
  <div id="tv-discovery-tabs" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
    <button class="tv-discovery-tab active" data-tab="trending" style="padding: 8px 16px; background: rgba(102, 205, 170, 0.2); border: 1px solid rgba(102, 205, 170, 0.5); color: #66cdaa; border-radius: 15px; cursor: pointer; font-weight: 600; transition: all 0.3s ease;">🔥 Trending</button>
    <button class="tv-discovery-tab" data-tab="popular" style="padding: 8px 16px; background: rgba(102, 205, 170, 0.1); border: 1px solid rgba(102, 205, 170, 0.3); color: #66cdaa; border-radius: 15px; cursor: pointer; font-weight: 600; transition: all 0.3s ease;">⭐ Popular</button>
    <button class="tv-discovery-tab" data-tab="top-rated" style="padding: 8px 16px; background: rgba(102, 205, 170, 0.1); border: 1px solid rgba(102, 205, 170, 0.3); color: #66cdaa; border-radius: 15px; cursor: pointer; font-weight: 600; transition: all 0.3s ease;">👑 Top Rated</button>
  </div>
  <div id="tv-genre-filters" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px;">
    <button class="tv-genre-btn active" data-genre="all" style="padding: 8px 14px; background: rgba(102, 205, 170, 0.2); border: 1px solid rgba(102, 205, 170, 0.5); color: #66cdaa; border-radius: 15px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; font-size: 0.9em;">All Genres</button>
    <button class="tv-genre-btn" data-genre="Action" style="padding: 8px 14px; background: rgba(102, 205, 170, 0.1); border: 1px solid rgba(102, 205, 170, 0.3); color: #66cdaa; border-radius: 15px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; font-size: 0.9em;">🎬 Action</button>
    <button class="tv-genre-btn" data-genre="Drama" style="padding: 8px 14px; background: rgba(102, 205, 170, 0.1); border: 1px solid rgba(102, 205, 170, 0.3); color: #66cdaa; border-radius: 15px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; font-size: 0.9em;">🎭 Drama</button>
    <button class="tv-genre-btn" data-genre="Comedy" style="padding: 8px 14px; background: rgba(102, 205, 170, 0.1); border: 1px solid rgba(102, 205, 170, 0.3); color: #66cdaa; border-radius: 15px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; font-size: 0.9em;">😂 Comedy</button>
    <button class="tv-genre-btn" data-genre="Crime" style="padding: 8px 14px; background: rgba(102, 205, 170, 0.1); border: 1px solid rgba(102, 205, 170, 0.3); color: #66cdaa; border-radius: 15px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; font-size: 0.9em;">🔍 Crime</button>
    <button class="tv-genre-btn" data-genre="Thriller" style="padding: 8px 14px; background: rgba(102, 205, 170, 0.1); border: 1px solid rgba(102, 205, 170, 0.3); color: #66cdaa; border-radius: 15px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; font-size: 0.9em;">😨 Thriller</button>
    <button class="tv-genre-btn" data-genre="Fantasy" style="padding: 8px 14px; background: rgba(102, 205, 170, 0.1); border: 1px solid rgba(102, 205, 170, 0.3); color: #66cdaa; border-radius: 15px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; font-size: 0.9em;">✨ Fantasy</button>
    <button class="tv-genre-btn" data-genre="Sci-Fi" style="padding: 8px 14px; background: rgba(102, 205, 170, 0.1); border: 1px solid rgba(102, 205, 170, 0.3); color: #66cdaa; border-radius: 15px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; font-size: 0.9em;">🚀 Sci-Fi</button>
  </div>
</div>


<main class="movie-grid">
  <div class="spinner"></div>
</main>

<div id="load-more-section">
  <button id="load-more-button" style="display: none;">Load More Movies</button>
</div>

<div id="movieModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <img id="modalPoster" src="" alt="Movie Poster">
    <div class="modal-details"></div>
  </div>
</div>

<script src="movie-fetcher.js"></script>
<script src="features.js"></script>
<script src="genre.js"></script>
<script src="watchlist.js"></script>
<script src="recommendations.js"></script>
<script src="notifications.js"></script>
<script src="collections.js"></script>
<script src="search-suggestions.js"></script>
<script src="tv-shows.js"></script>
<script src="pwa-setup.js"></script>
<script src="ui-integration.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const ids = [
      'view-collections-btn',
      'open-watchlist-feature-btn',
      'toggle-tv-shows-btn',
      'open-sharing-feature-btn',
      'view-ratings-btn',
      'view-recommendations-btn',
      'open-search-suggestions-btn',
      'view-profiles-btn'
    ];
    ids.forEach(id => {
      const el = document.getElementById(id);
      console.log('Feature button', id, 'exists?', !!el);
      if (el) {
        el.addEventListener('click', () => console.log('Clicked', id));
      }
    });
  });
</script>
</body>
